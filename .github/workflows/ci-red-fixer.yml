name: 'CI Red Fixer'

on:
  # Daily schedule: 16:00 UTC = 00:00 China Standard Time
  schedule:
    - cron: '0 16 * * *'

  workflow_dispatch:
    inputs:
      run_id:
        description: 'Specific failed Defense run id to repair'
        required: false
        type: string
      branch:
        description: 'Branch to inspect'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Inspect only without code changes or commits'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

concurrency:
  group: ci-red-fixer-${{ github.event.inputs.branch || 'main' }}
  cancel-in-progress: false

jobs:
  repair-defense:
    name: 'Repair failed Defense run'
    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Skip repair (No API Key)
        if: env.ANTHROPIC_API_KEY == '' && github.event.inputs.dry_run != 'true'
        run: |
          echo "## ⚠️ Repair Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No ANTHROPIC_AUTH_TOKEN secret configured. Set it in repository secrets to enable automated CI repair." >> $GITHUB_STEP_SUMMARY

      - name: Run repair
        if: env.ANTHROPIC_API_KEY != '' || github.event.inputs.dry_run == 'true'
        env:
          EVENT_NAME_SAFE: ${{ github.event_name }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id || '' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "## 🔧 CI Red Fixer" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${TARGET_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${EVENT_NAME_SAFE}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          args=(--branch "$TARGET_BRANCH" --report-file /tmp/ci-red-fixer-report.json)
          if [ -n "$INPUT_RUN_ID" ]; then
            args+=(--run-id "$INPUT_RUN_ID")
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi

          npx tsx scripts/ci-red-fixer.ts "${args[@]}" 2>&1 | tee /tmp/ci-red-fixer-output.txt

      - name: Append summary
        if: env.ANTHROPIC_API_KEY != '' || github.event.inputs.dry_run == 'true'
        run: |
          if [ -f /tmp/ci-red-fixer-report.json ]; then
            RUN_STATUS=$(jq -r '.status' /tmp/ci-red-fixer-report.json)
            RUN_URL=$(jq -r '.targetRun.htmlUrl // "n/a"' /tmp/ci-red-fixer-report.json)
            VALIDATION=$(jq -r '(.validationCommands // []) | if length == 0 then "n/a" else join(", ") end' /tmp/ci-red-fixer-report.json)

            echo "### Target Run" >> $GITHUB_STEP_SUMMARY
            echo "- Status: ${RUN_STATUS}" >> $GITHUB_STEP_SUMMARY
            echo "- Run URL: ${RUN_URL}" >> $GITHUB_STEP_SUMMARY
            echo "- Validation: ${VALIDATION}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -200 /tmp/ci-red-fixer-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for changes
        id: changes
        if: env.ANTHROPIC_API_KEY != '' || github.event.inputs.dry_run == 'true'
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📝 Changes Made" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push changes
        if: |
          steps.changes.outputs.has_changes == 'true' &&
          github.event.inputs.dry_run != 'true'
        env:
          REPAIR_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          SOURCE_RUN_URL=$(jq -r '.targetRun.htmlUrl // "unknown"' /tmp/ci-red-fixer-report.json)

          git add -A
          git commit -m "fix: automated repair for Defense CI failure

          - Repaired latest failed Defense workflow on ${TARGET_BRANCH}
          - Source run: ${SOURCE_RUN_URL}
          - Repair run: ${REPAIR_RUN_URL}

          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin HEAD:${TARGET_BRANCH}
